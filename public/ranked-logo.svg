<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A6B"/>
      <stop offset="100%" style="stop-color:#0d1f3e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield outer -->
  <path d="M32 4 L54 14 L54 34 C54 46 42 56 32 60 C22 56 10 46 10 34 L10 14 Z"
    fill="url(#shieldGrad)" />

  <!-- Shield inner -->
  <path d="M32 10 L50 18.5 L50 34 C50 43.5 41 52 32 55.5 C23 52 14 43.5 14 34 L14 18.5 Z"
    fill="url(#innerGrad)" />

  <!-- Star -->
  <polygon
    points="32,20 34.4,27.2 42,27.2 36,31.8 38.4,39 32,34.4 25.6,39 28,31.8 22,27.2 29.6,27.2"
    fill="url(#shieldGrad)"
    filter="url(#glow)"
  />

  <!-- Rank stripes at bottom of shield -->
  <rect x="22" y="44" width="20" height="2.5" rx="1.25" fill="#FFD700" opacity="0.9"/>
  <rect x="25" y="48" width="14" height="2.5" rx="1.25" fill="#FFD700" opacity="0.6"/>
</svg>
