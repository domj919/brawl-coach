<svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="discGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#CCCCCC"/>
    </radialGradient>
    <radialGradient id="blueWing" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3A7FFF"/>
      <stop offset="100%" style="stop-color:#1040B0"/>
    </radialGradient>
    <radialGradient id="redWing" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF4040"/>
      <stop offset="100%" style="stop-color:#B01010"/>
    </radialGradient>
  </defs>

  <!-- Left blue wing (3 lobes) -->
  <path d="M88 105
    C78 90, 58 75, 38 55
    C28 45, 14 38, 8 28
    C4 20, 8 12, 16 12
    C26 12, 38 22, 46 36
    C50 24, 58 14, 68 12
    C78 10, 86 18, 84 28
    C82 38, 72 46, 66 58
    C74 48, 84 38, 92 38
    C100 38, 104 46, 100 56
    C96 66, 86 74, 84 88
    Z"
    fill="url(#blueWing)" stroke="#111" stroke-width="3" stroke-linejoin="round"/>

  <!-- Right red wing (3 lobes, mirrored) -->
  <path d="M112 105
    C122 90, 142 75, 162 55
    C172 45, 186 38, 192 28
    C196 20, 192 12, 184 12
    C174 12, 162 22, 154 36
    C150 24, 142 14, 132 12
    C122 10, 114 18, 116 28
    C118 38, 128 46, 134 58
    C126 48, 116 38, 108 38
    C100 38, 96 46, 100 56
    C104 66, 114 74, 116 88
    Z"
    fill="url(#redWing)" stroke="#111" stroke-width="3" stroke-linejoin="round"/>

  <!-- Disc shadow -->
  <circle cx="100" cy="95" r="72" fill="#111" opacity="0.3"/>

  <!-- Disc border -->
  <circle cx="100" cy="93" r="72" fill="#111"/>

  <!-- Disc face -->
  <circle cx="100" cy="93" r="66" fill="url(#discGrad)"/>

  <!-- Skull cranium -->
  <path d="M58 100 C58 65, 72 48, 100 48 C128 48, 142 65, 142 100 L140 112 L60 112 Z"
    fill="#F0F0F0" stroke="#111" stroke-width="3"/>

  <!-- Jaw -->
  <path d="M66 110 L66 128 C66 134, 70 138, 76 138 L124 138 C130 138, 134 134, 134 128 L134 110 Z"
    fill="#F0F0F0" stroke="#111" stroke-width="3"/>

  <!-- Teeth dividers -->
  <line x1="82" y1="110" x2="82" y2="138" stroke="#111" stroke-width="3"/>
  <line x1="100" y1="110" x2="100" y2="138" stroke="#111" stroke-width="3"/>
  <line x1="118" y1="110" x2="118" y2="138" stroke="#111" stroke-width="3"/>

  <!-- Left eye socket -->
  <ellipse cx="82" cy="88" rx="16" ry="18" fill="#111"/>
  <!-- Right eye socket -->
  <ellipse cx="118" cy="88" rx="16" ry="18" fill="#111"/>

  <!-- Nose -->
  <path d="M95 108 L100 100 L105 108 Z" fill="#111"/>

  <!-- Highlight on disc -->
  <ellipse cx="85" cy="62" rx="20" ry="10" fill="white" opacity="0.45"/>
</svg>
